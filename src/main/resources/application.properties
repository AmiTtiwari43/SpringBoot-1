# ===================================================================
# APPLICATION CONFIGURATION
# ===================================================================
spring.application.name=demo
server.port=8080

# ===================================================================
# H2 CONSOLE CONFIGURATION
# ===================================================================
# Enable the web console UI interface
spring.h2.console.enabled=true

# Custom path to access console (http://localhost:8080/h2-console)
spring.h2.console.path=/h2-console

# Keeps database alive even if all connection pools drop temporarily
spring.h2.console.settings.web-allow-others=false

# ===================================================================
# DATA SOURCE CONFIGURATION (IN-MEMORY)
# ===================================================================
# Match this exact URL path in your browser login interface
spring.datasource.url=jdbc:h2:mem:testdb

# Standard driver class name for the H2 database engine
spring.datasource.driver-class-name=org.h2.Driver

# Connection credentials (keep password completely empty)
spring.datasource.username=sa
spring.datasource.password=

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# Explicitly sets the SQL translation engine dialect for H2 syntax
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Automatically builds/updates tables based on your @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Logs executed SQL statements clearly inside your terminal console
spring.jpa.show-sql=true

# Formats single-line SQL logs into clean, readable multi-line blocks
spring.jpa.properties.hibernate.format_sql=true

# Includes the exact parameter values instead of '?' bind markers in logs
logging.level.org.hibernate.orm.jdbc.bind=trace
